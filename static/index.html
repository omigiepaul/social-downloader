<!DOCTYPE html>
<html>
<head>
    <title>Social Downloader</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 30px; background: #f4f4f4; }
        input, textarea { width: 80%; padding: 12px; margin: 10px; font-size: 16px; }
        button { padding: 12px 25px; margin: 10px; font-size: 16px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .note { color: red; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🎥 Social Media Downloader</h1>
    <p>Paste link and optionally upload cookies for better YouTube support.</p>
    
    <input type="text" id="url" placeholder="https://youtube.com/watch?v=... or TikTok link">
    <br>
    <input type="file" id="cookieFile" accept=".txt">
    <br><br>
    <button onclick="download()">Download Video</button>
    <button onclick="downloadAudio()">Download Audio Only</button>

    <p class="note">* For better YouTube results, upload cookies.txt from your browser</p>

    <script>
        async function download() {
            const url = document.getElementById("url").value.trim();
            const cookieFile = document.getElementById("cookieFile").files[0];
            
            if (!url) {
                alert("Please enter a link");
                return;
            }

            const formData = new FormData();
            formData.append("url", url);
            if (cookieFile) formData.append("cookie_file", cookieFile);

            try {
                const response = await fetch("/download", {
                    method: "POST",
                    body: formData
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = "download.mp4";
                    link.click();
                } else {
                    const error = await response.json();
                    alert(error.detail);
                }
            } catch (err) {
                alert("Download failed. Try again.");
            }
        }

        async function downloadAudio() {
            // Similar to above, but we can add format later
            alert("Audio download coming soon. Use video for now.");
        }
    </script>
</body>
</html>
