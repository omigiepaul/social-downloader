<!DOCTYPE html>
<html>
<head>
    <title>My Social Downloader</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; }
        input { width: 500px; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; }
    </style>
</head>
<body>
    <h1>Social Media Downloader</h1>
    <p>Paste link from TikTok, Instagram, YouTube, etc.</p>
    
    <input type="text" id="link" placeholder="https://www.tiktok.com/...">
    <br><br>
    <button onclick="downloadVideo()">Download Video</button>
    <button onclick="downloadAudio()">Download Audio Only</button>

    <script>
        function downloadVideo() {
            const url = document.getElementById("link").value;
            if (!url) { alert("Please paste a link!"); return; }
            window.location.href = `/download?url=${encodeURIComponent(url)}`;
        }
        
        function downloadAudio() {
            const url = document.getElementById("link").value;
            if (!url) { alert("Please paste a link!"); return; }
            window.location.href = `/download?url=${encodeURIComponent(url)}&format=audio`;  // We'll improve this next
        }
    </script>
</body>
</html>
